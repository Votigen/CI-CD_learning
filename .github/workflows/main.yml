# 给这个工作流起个名字，会显示在 Actions 界面
name: 我的第一个自动化体验

# 什么时候触发？ push 代码到 main 分支，或者手动点击运行
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# 具体要做的事情（任务）
jobs:
  # 这个任务叫 say-hello
  say-hello:
    # 运行在最新的 Ubuntu 虚拟机里（相当于白嫖 GitHub 一台电脑）
    runs-on: ubuntu-latest
    
    steps:
      # 第一步：把仓库的代码下载到虚拟机里（几乎必写）
      - uses: actions/checkout@v4

      # 第二步：运行一行命令，打印欢迎语
      - name: 向学习者打招呼
        run: echo "🎉 同学你好！欢迎来到 GitHub Actions 的世界！"

      # 第三步：显示一下当前的构建时间
      - name: 显示当前服务器时间
        run: date

      # 第四步：列一下这个仓库里有什么文件
      - name: 看看里面有什么
        run: ls -la
