name: CI/CD for scmproject

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code and redeploy
        run: |
          cd /home/hwb/projects/CI-CD_learning/scmproject
          git pull origin main
          docker compose down
          docker compose up -d --build

      - name: Show container status
        run: docker ps